<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #102a43; }
      .sub { font: 500 16px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #52606d; }
      .box { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; rx: 14; }
      .super { fill: #0f766e; }
      .agent { fill: #4f46e5; }
      .data { fill: #c2410c; }
      .light { fill: #f1f5f9; stroke: #cbd5e1; rx: 12; }
      .h1 { font: 700 22px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #102a43; }
      .white { font: 700 18px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .text { font: 500 14px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #334e68; }
      .small { font: 500 13px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #52606d; }
      .arrow { stroke: #9fb3c8; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9fb3c8"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="54" y="62">多 Agent 对话流程图：规则快速路由 + LLM 语义兜底</text>
  <text class="sub" x="56" y="92">检测、诊断、报告、病例分析和医学问答由专业节点处理，最终回复统一生成</text>

  <rect class="box" x="60" y="165" width="185" height="82"/>
  <text class="h1" x="100" y="198">用户输入</text>
  <text class="small" x="89" y="225">文字 / 胸片附件 / ZIP</text>

  <path class="arrow" d="M 245 206 L 325 206"/>

  <rect class="super" x="325" y="150" width="230" height="112" rx="16"/>
  <text class="white" x="366" y="191">Supervisor 路由</text>
  <text class="white" x="356" y="224">先规则判断，再 LLM 判断</text>

  <rect class="light" x="305" y="305" width="270" height="105"/>
  <text class="h1" x="344" y="340">快速规则</text>
  <text class="text" x="337" y="370">附件 → detection</text>
  <text class="text" x="337" y="394">报告 / 诊断 / 治疗 / 知识问答关键词</text>

  <rect class="light" x="305" y="448" width="270" height="86"/>
  <text class="h1" x="345" y="482">语义兜底</text>
  <text class="text" x="337" y="512">规则无法确定时由 LLM 结合历史路由</text>

  <path class="dash" d="M 435 263 L 435 302"/>
  <path class="dash" d="M 435 412 L 435 445"/>

  <path class="arrow" d="M 555 206 L 638 206"/>

  <rect class="agent" x="638" y="115" width="178" height="68" rx="14"/>
  <text class="white" x="678" y="156">Detection</text>
  <rect class="agent" x="638" y="216" width="178" height="68" rx="14"/>
  <text class="white" x="681" y="257">Diagnosis</text>
  <rect class="agent" x="638" y="317" width="178" height="68" rx="14"/>
  <text class="white" x="695" y="358">Report</text>
  <rect class="agent" x="638" y="418" width="178" height="68" rx="14"/>
  <text class="white" x="686" y="459">Case Plan</text>
  <rect class="agent" x="638" y="519" width="178" height="68" rx="14"/>
  <text class="white" x="711" y="560">QA</text>

  <path class="arrow" d="M 727 184 L 727 213"/>
  <text class="small" x="744" y="204">检测后自动进入诊断</text>

  <rect class="data" x="925" y="156" width="236" height="105" rx="16"/>
  <text class="white" x="966" y="195">上下文与知识</text>
  <text class="white" x="948" y="226">检测结果 / 病史 / 历史检测 / RAG</text>

  <path class="arrow" d="M 816 250 C 860 250, 880 218, 922 210"/>
  <path class="arrow" d="M 922 210 C 881 300, 856 460, 816 552"/>

  <rect class="super" x="930" y="400" width="230" height="112" rx="16"/>
  <text class="white" x="974" y="441">Supervisor Answer</text>
  <text class="white" x="960" y="474">结合完整历史组织最终回复</text>

  <path class="arrow" d="M 816 149 C 875 164, 888 395, 928 435"/>
  <path class="arrow" d="M 816 351 C 862 361, 887 422, 927 449"/>
  <path class="arrow" d="M 816 452 C 856 453, 884 456, 927 456"/>
  <path class="arrow" d="M 816 553 C 862 544, 887 493, 927 475"/>

  <rect class="box" x="1010" y="565" width="185" height="82"/>
  <text class="h1" x="1054" y="598">用户获得</text>
  <text class="small" x="1042" y="625">检测卡片 / 风险解释 / 报告</text>
  <path class="arrow" d="M 1045 514 L 1083 562"/>
</svg>
