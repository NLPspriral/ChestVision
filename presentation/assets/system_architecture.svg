<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #102a43; }
      .sub { font: 500 15px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #52606d; }
      .colHead { font: 700 20px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #102a43; }
      .group { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; rx: 12; }
      .module { fill: #ffffff; stroke: #bcccdc; stroke-width: 1.5; rx: 12; }
      .platform { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 16; }
      .groupTitle { font: 700 16px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #102a43; }
      .moduleTitle { font: 700 18px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #102a43; }
      .capTitle { font: 700 23px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #064e3b; }
      .text { font: 500 13px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #334e68; }
      .tiny { font: 500 12px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #52606d; }
      .chip { font: 700 12px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .chipBox { rx: 8; }
      .front { fill: #2563eb; }
      .back { fill: #0f766e; }
      .ai { fill: #7c3aed; }
      .data { fill: #c2410c; }
      .ops { fill: #475569; }
      .arrow { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #cbd5e1; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="48" y="58">技术架构图：技术组件 → 功能模块 → ChestVision 平台</text>
  <text class="sub" x="50" y="88">展示每类技术如何支撑模块，再由模块组合为胸片检测、对话分析、医患协同和模型迭代能力</text>

  <text class="colHead" x="78" y="128">1. 技术组件</text>
  <text class="colHead" x="472" y="128">2. 模块构成</text>
  <text class="colHead" x="920" y="128">3. 整体平台能力</text>

  <rect class="group" x="55" y="150" width="330" height="96"/>
  <text class="groupTitle" x="78" y="178">前端技术</text>
  <rect class="chipBox front" x="78" y="193" width="70" height="26"/><text class="chip" x="95" y="211">Vue 3</text>
  <rect class="chipBox front" x="156" y="193" width="98" height="26"/><text class="chip" x="170" y="211">Element Plus</text>
  <rect class="chipBox front" x="262" y="193" width="62" height="26"/><text class="chip" x="278" y="211">Pinia</text>
  <text class="tiny" x="78" y="232">Vue Router / Axios / SSE / ECharts / Markdown</text>

  <rect class="group" x="55" y="268" width="330" height="110"/>
  <text class="groupTitle" x="78" y="296">后端服务技术</text>
  <rect class="chipBox back" x="78" y="311" width="78" height="26"/><text class="chip" x="94" y="329">FastAPI</text>
  <rect class="chipBox back" x="164" y="311" width="100" height="26"/><text class="chip" x="179" y="329">SQLAlchemy</text>
  <rect class="chipBox back" x="272" y="311" width="70" height="26"/><text class="chip" x="289" y="329">Alembic</text>
  <text class="tiny" x="78" y="350">Pydantic / JWT / RBAC / Uvicorn / REST API</text>

  <rect class="group" x="55" y="400" width="330" height="124"/>
  <text class="groupTitle" x="78" y="428">AI 与算法技术</text>
  <rect class="chipBox ai" x="78" y="443" width="88" height="26"/><text class="chip" x="93" y="461">YOLOv11</text>
  <rect class="chipBox ai" x="174" y="443" width="72" height="26"/><text class="chip" x="193" y="461">OpenCV</text>
  <rect class="chipBox ai" x="254" y="443" width="92" height="26"/><text class="chip" x="270" y="461">LangGraph</text>
  <text class="tiny" x="78" y="482">LangChain / Qwen 或 OpenAI / RAG / Pgvector</text>
  <text class="tiny" x="78" y="504">规则路由 + LLM 语义路由 + 医学知识检索</text>

  <rect class="group" x="55" y="546" width="330" height="112"/>
  <text class="groupTitle" x="78" y="574">数据、存储与训练基础设施</text>
  <rect class="chipBox data" x="78" y="589" width="94" height="26"/><text class="chip" x="92" y="607">PostgreSQL</text>
  <rect class="chipBox data" x="180" y="589" width="60" height="26"/><text class="chip" x="195" y="607">Redis</text>
  <rect class="chipBox data" x="248" y="589" width="88" height="26"/><text class="chip" x="264" y="607">MinIO/OSS</text>
  <text class="tiny" x="78" y="628">Docker Compose / OSS Multipart / PAI-DLC</text>
  <text class="tiny" x="78" y="648">影像、数据集、模型权重、任务状态与训练产物</text>

  <rect class="module" x="455" y="150" width="365" height="96"/>
  <text class="moduleTitle" x="482" y="180">Web 交互模块</text>
  <text class="text" x="482" y="207">检测工作台 / 智能对话 / 患者与病例页面</text>
  <text class="text" x="482" y="230">历史记录 / 统计看板 / 训练与模型管理页面</text>

  <rect class="module" x="455" y="268" width="365" height="110"/>
  <text class="moduleTitle" x="482" y="298">API 与权限模块</text>
  <text class="text" x="482" y="325">认证注册 / 用户角色 / 医患关系 / 病例 CRUD</text>
  <text class="text" x="482" y="348">检测接口 / 对话 SSE / 报告接口 / 管理接口</text>

  <rect class="module" x="455" y="400" width="365" height="124"/>
  <text class="moduleTitle" x="482" y="430">AI 推理与智能体模块</text>
  <text class="text" x="482" y="457">胸片病灶检测：类别、置信度、标注框、风险等级</text>
  <text class="text" x="482" y="480">多 Agent：检测、诊断、报告、病例分析、问答</text>
  <text class="text" x="482" y="503">病史上下文 + RAG 知识 + 医生推荐匹配</text>

  <rect class="module" x="455" y="546" width="365" height="112"/>
  <text class="moduleTitle" x="482" y="576">数据沉淀与模型迭代模块</text>
  <text class="text" x="482" y="603">用户、病例、检测任务、检测结果、模型版本入库</text>
  <text class="text" x="482" y="626">OSS 分片上传、云上容器训练、产物登记和默认模型切换</text>

  <rect class="platform" x="902" y="198" width="320" height="322"/>
  <text class="capTitle" x="955" y="238">ChestVision 平台</text>
  <text class="text" x="940" y="278">胸片上传与 YOLO 辅助检测</text>
  <text class="text" x="940" y="314">病史感知分析与自然语言解释</text>
  <text class="text" x="940" y="350">患者、医生、管理员权限隔离</text>
  <text class="text" x="940" y="386">医患关系、病例、报告与历史追踪</text>
  <text class="text" x="940" y="422">多 Agent 对话与医生推荐接力</text>
  <text class="text" x="940" y="458">远程训练、模型版本与推理缓存</text>

  <rect class="module" x="914" y="552" width="296" height="86"/>
  <text class="moduleTitle" x="948" y="584">部署与运行形态</text>
  <text class="text" x="948" y="611">Docker Compose 本地部署</text>
  <text class="text" x="948" y="634">PostgreSQL + Redis + MinIO + FastAPI + Vue/Nginx</text>

  <path class="arrow" d="M 385 198 L 452 198"/>
  <path class="arrow" d="M 385 323 L 452 323"/>
  <path class="arrow" d="M 385 462 L 452 462"/>
  <path class="arrow" d="M 385 602 L 452 602"/>

  <path class="arrow" d="M 820 198 L 899 270"/>
  <path class="arrow" d="M 820 323 L 899 335"/>
  <path class="arrow" d="M 820 462 L 899 410"/>
  <path class="arrow" d="M 820 602 L 899 478"/>
  <path class="thin" d="M 1062 520 L 1062 549"/>
</svg>
