<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 500 16px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #486581; }
      .h { font: 700 23px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #102a43; }
      .small { font: 500 15px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #334e68; }
      .tiny { font: 500 13px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #52606d; }
      .label { font: 700 15px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: white; }
      .line { stroke: #9fb3c8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .card { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; rx: 12; }
      .patient { fill: #0f766e; }
      .doctor { fill: #4f46e5; }
      .admin { fill: #c2410c; }
      .module { fill: #e0f2fe; stroke: #38bdf8; }
      .tech { fill: #ecfdf5; stroke: #34d399; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9fb3c8"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="54" y="62">需求分析图：三类诉求到系统能力的适配</text>
  <text class="subtitle" x="56" y="92">从患者、医生、管理员三方诉求出发，映射到核心模块与实现技术</text>

  <rect class="card" x="54" y="125" width="308" height="155"/>
  <rect class="patient" x="54" y="125" width="308" height="40" rx="12"/>
  <text class="label" x="78" y="151">患者诉求</text>
  <text class="small" x="78" y="194">快速上传胸片并获得反馈</text>
  <text class="small" x="78" y="223">用自然语言理解病情和风险</text>
  <text class="small" x="78" y="252">必要时获得医生推荐与转接</text>

  <rect class="card" x="54" y="304" width="308" height="155"/>
  <rect class="doctor" x="54" y="304" width="308" height="40" rx="12"/>
  <text class="label" x="78" y="330">医生诉求</text>
  <text class="small" x="78" y="373">结构化查看检测结果和病史</text>
  <text class="small" x="78" y="402">减少重复问诊和报告整理</text>
  <text class="small" x="78" y="431">关注高风险病例与随访建议</text>

  <rect class="card" x="54" y="483" width="308" height="155"/>
  <rect class="admin" x="54" y="483" width="308" height="40" rx="12"/>
  <text class="label" x="78" y="509">管理员诉求</text>
  <text class="small" x="78" y="552">维护用户、权限和医患关系</text>
  <text class="small" x="78" y="581">审核医生匹配与信息接力</text>
  <text class="small" x="78" y="610">管理模型版本和训练任务</text>

  <rect class="card module" x="472" y="135" width="312" height="125"/>
  <text class="h" x="500" y="174">模型对话模块</text>
  <text class="small" x="500" y="205">智能问答、报告生成、医生推荐</text>
  <text class="tiny" x="500" y="235">关键词路由 + LLM 路由 / SSE / LangGraph</text>

  <rect class="card module" x="472" y="302" width="312" height="125"/>
  <text class="h" x="500" y="341">推理管理模块</text>
  <text class="small" x="500" y="372">单图、批量、ZIP 胸片检测</text>
  <text class="tiny" x="500" y="402">YOLOv11 / 标注图 / 风险等级 / 入库</text>

  <rect class="card module" x="472" y="469" width="312" height="125"/>
  <text class="h" x="500" y="508">训练与模型管理</text>
  <text class="small" x="500" y="539">数据集上传、远程训练、版本切换</text>
  <text class="tiny" x="500" y="569">OSS 分片上传 / PAI-DLC / model_versions</text>

  <rect class="card tech" x="905" y="135" width="300" height="125"/>
  <text class="h" x="932" y="174">患者侧价值</text>
  <text class="small" x="932" y="205">及时反馈、降低理解门槛</text>
  <text class="small" x="932" y="234">从 AI 初筛过渡到医生接诊</text>

  <rect class="card tech" x="905" y="302" width="300" height="125"/>
  <text class="h" x="932" y="341">医生侧价值</text>
  <text class="small" x="932" y="372">病灶、病史、历史检测统一呈现</text>
  <text class="small" x="932" y="401">提升诊断准备和沟通效率</text>

  <rect class="card tech" x="905" y="469" width="300" height="125"/>
  <text class="h" x="932" y="508">系统侧价值</text>
  <text class="small" x="932" y="539">权限隔离、过程留痕</text>
  <text class="small" x="932" y="568">模型可训练、可登记、可回滚</text>

  <path class="line" d="M 362 201 C 405 185, 427 178, 469 176"/>
  <path class="line" d="M 362 224 C 410 268, 432 330, 469 360"/>
  <path class="line" d="M 362 381 C 410 376, 432 368, 469 364"/>
  <path class="line" d="M 362 411 C 410 315, 433 218, 469 194"/>
  <path class="line" d="M 362 560 C 407 548, 431 532, 469 525"/>
  <path class="line" d="M 362 590 C 410 486, 432 410, 469 383"/>

  <path class="line" d="M 784 198 C 828 198, 860 198, 902 198"/>
  <path class="line" d="M 784 365 C 828 365, 860 365, 902 365"/>
  <path class="line" d="M 784 532 C 828 532, 860 532, 902 532"/>
</svg>
